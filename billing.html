<!DOCTYPE html>
<html>
<head>
<title>Samskriti Billing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{box-sizing:border-box}

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.container{
width:750px;
margin:auto;
background:white;
padding:12px;
border:1px solid #999;
}

/* CROSS */
.cross{
text-align:center;
font-size:22px;
margin-bottom:5px;
}

/* HEADER */
.header{
display:flex;
justify-content:flex-start;
align-items:flex-start;
margin-bottom:10px;
position:relative;
}

.address{
font-size:13px;
line-height:18px;
margin-top:45px;
}

.centerTitle{
position:absolute;
left:50%;
transform:translateX(-60%); /* moves logo slightly left */
top:0;
text-align:center;
width:320px;
}

.logo{
height:90px;
object-fit:contain;
}

/* BILL DETAILS */
.top{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.customer{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.customer input{
border:none;
border-bottom:1px solid black;
width:200px;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #555;
padding:4px;
text-align:center;
}

th{
background:#eee;
}

input{
border:none;
width:100%;
text-align:center;
}

/* BOTTOM */
.bottomArea{
display:flex;
margin-top:10px;
gap:10px;
align-items:flex-start;
}

.imageBox{
flex:1;
border:1px dashed #555;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
height:110px;
overflow:hidden;
}

.imageBox img{
width:100%;
height:100%;
object-fit:contain;
}

.summary{
width:220px;
border:1px solid #555;
}

.summary div{
display:flex;
justify-content:space-between;
border-bottom:1px solid #555;
padding:5px;
}
/* PRINT SETTINGS */

@media print{

.buttonRow{
display:none;
}

.searchBox{
display:none;
}

body{
background:white;
}

.container{
box-shadow:none;
border:none;
}

}

/* SIGNATURE */
.signatureArea{
display:flex;
justify-content:flex-end;
margin-top:40px;
}

.shopName{
font-family:"Copperplate Gothic Bold","Copperplate Gothic",serif;
font-size:18px;
text-align:center;
margin-bottom:5px;
}

.signLine{
border-top:1px solid black;
margin-top:40px;
padding-top:5px;
text-align:center;
}

/* BUTTONS */
button{
margin-top:10px;
padding:7px 18px;
background:#d81b60;
color:white;
border:none;
cursor:pointer;
margin-right:5px;
}

.buttonRow{
display:flex;
justify-content:center;
margin-top:10px;
}

/* SEARCH BOX */
.searchBox{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border:2px solid #d81b60;
display:none;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<div class="cross">✝</div>

<div class="header">

<div class="address">
#5, Aarumuganagar<br>
Mahalingapuram<br>
Pollachi<br>
Mob: 88830 40967<br>
83449 10001
</div>

<div class="centerTitle">
<img src="logo-removebg-preview.png" class="logo">
</div>

</div>

<div class="top">
<div>No : <input id="billNo" readonly></div>
<div>Date : <input type="date" id="billDate"></div>
</div>

<div class="customer">
<div>M/s : <input id="custName"></div>
<div>Ph : <input id="custPhone"></div>
</div>

<table>
<tr>
<th>S.No</th>
<th>Particulars</th>
<th>Qty</th>
<th>Rate</th>
<th>Amount</th>
</tr>
<tbody id="items"></tbody>
</table>

<div class="bottomArea">

<div class="imageBox" onclick="cameraInput.click()">
Add Image
<input type="file" id="cameraInput" hidden>
<img id="preview">
</div>

<div class="summary">

<div>
<span>Total</span>
<input id="total" readonly>
</div>

<div>
<span>Advance</span>
<input id="advance" oninput="balance()">
</div>

<div>
<span>Balance</span>
<input id="balance" readonly>
</div>

</div>
</div>

<div class="signatureArea">
<div>
<div class="shopName">Samskriti</div>
<div class="signLine">Authorized Signature</div>
</div>
</div>

<div class="buttonRow">
<button onclick="openSearch()">Search</button>
<button onclick="saveBill()">Save</button>
<button onclick="window.print()">Print</button>
<button onclick="newBill()">New Bill</button>
</div>

</div>

<div class="searchBox" id="searchBox">
Enter Bill Number<br><br>
<input id="searchBillNo" style="border:1px solid #999;width:150px"><br><br>
<button onclick="searchBill()">Find</button>
<button onclick="closeSearch()">Close</button>
</div>

<script>

const products=[
"Lining Salwar","Ordinary Salwar","Lining Blouse","Ordinary Blouse",
"Falls (Machine)","Falls (Hemming)","Silk Skirt","Nighty",
"Maxi","Designer Wear","Embroidery"
];

let tbody=document.getElementById("items");
let i=1;

products.forEach(p=>{
let row=document.createElement("tr");
row.innerHTML=`
<td>${i++}</td>
<td>${p}</td>
<td><input type="number" oninput="calc()"></td>
<td><input type="number" oninput="calc()"></td>
<td><input readonly></td>`;
tbody.appendChild(row);
});

for(let j=0;j<5;j++){
let row=document.createElement("tr");
row.innerHTML=`
<td>${i++}</td>
<td><input></td>
<td><input type="number" oninput="calc()"></td>
<td><input type="number" oninput="calc()"></td>
<td><input readonly></td>`;
tbody.appendChild(row);
}

function calc(){
let total=0;
document.querySelectorAll("#items tr").forEach(r=>{
let q=r.children[2].children[0].value||0;
let rate=r.children[3].children[0].value||0;
let amt=q*rate;
r.children[4].children[0].value=amt;
total+=Number(amt);
});
document.getElementById("total").value=total;
balance();
}

function balance(){
let total=document.getElementById("total").value||0;
let adv=document.getElementById("advance").value||0;
document.getElementById("balance").value=total-adv;
}

cameraInput.onchange=e=>{
let reader=new FileReader();
reader.onload=x=>{ preview.src=x.target.result; };
reader.readAsDataURL(e.target.files[0]);
}

function generateBillNo(){
let last=localStorage.getItem("lastBill");
if(!last) last=1000;
else last=parseInt(last)+1;
localStorage.setItem("lastBill",last);
billNo.value=last;
}

function newBill(){
document.querySelectorAll("input").forEach(i=>i.value="");
preview.src="";
billDate.value=new Date().toISOString().split("T")[0];
generateBillNo();
}

function saveBill(){

let items=[];

document.querySelectorAll("#items tr").forEach(r=>{
let particular=r.children[1].innerText || r.children[1].children[0]?.value;
let qty=r.children[2].children[0].value;
let rate=r.children[3].children[0].value;
let amount=r.children[4].children[0].value;

if(qty && rate){
items.push({particular,qty,rate,amount});
}
});

let bill={
bill_no:billNo.value,
bill_date:billDate.value,
customer_name:custName.value,
phone:custPhone.value,
total:total.value,
advance:advance.value,
balance:balance.value,
image:preview.src,
items:items
};

fetch("http://localhost:5000/saveBill",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(bill)
})
.then(res=>res.json())
.then(()=>alert("Bill Saved Successfully"));

}

function openSearch(){ searchBox.style.display="block"; }
function closeSearch(){ searchBox.style.display="none"; }

function searchBill(){

let billno=searchBillNo.value;

fetch("http://localhost:5000/bill/"+billno)
.then(res=>res.json())
.then(data=>{

if(!data){
alert("Bill not found");
return;
}

billNo.value=data.bill_no;
billDate.value=data.bill_date;
custName.value=data.customer_name;
custPhone.value=data.phone;
total.value=data.total;
advance.value=data.advance_amount;
balance.value=data.balance_amount;

document.querySelectorAll("#items tr").forEach((r,i)=>{
if(data.items[i]){
r.children[2].children[0].value=data.items[i].qty;
r.children[3].children[0].value=data.items[i].rate;
r.children[4].children[0].value=data.items[i].amount;
}
});

closeSearch();

});

}

billDate.value=new Date().toISOString().split("T")[0];
generateBillNo();

</script>

</body>
</html>
