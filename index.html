<!DOCTYPE html>
<html>
<head>
<title>Samskriti Boutique Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:linear-gradient(to right,#fce4ec,#f3e5f5);
margin:0;
padding:40px;
text-align:center;
}

h1{
color:#ad1457;
margin-bottom:30px;
}

.login-box{
width:300px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px 20px;
background:#ad1457;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
width:100%;
}

button:hover{
background:#880e4f;
}

#error{
color:red;
font-size:14px;
}

</style>
</head>

<body>

<h1>🌸 SAMSKRITI Boutique</h1>

<div class="login-box">

<h3>Login</h3>

<input type="text" id="username" placeholder="Enter Username">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<p id="error"></p>

</div>

<script>

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

/* change username and password here */

if(user==="admin" && pass==="1234")
{
window.location.href="home.html";
}
else
{
document.getElementById("error").innerHTML="Invalid Username or Password";
}

}

</script>

</body>
</html>
